[build]
  publish = "."
  functions = "netlify/functions"

# El service worker nunca debe cachearse en el CDN
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Seguridad básica en todas las rutas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA redirect: cualquier ruta desconocida → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
